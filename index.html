<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>蜗迹 - 慢即是快，用思考和专注实现更高的效率</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 80px 24px;
      text-align: center;
    }

    .logo {
      width: 120px;
      height: 120px;
      margin-bottom: 32px;
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    h1 {
      font-size: 48px;
      font-weight: 700;
      margin-bottom: 16px;
      letter-spacing: -1px;
    }

    .tagline {
      font-size: 20px;
      color: #a0aec0;
      margin-bottom: 48px;
    }

    .download-btn {
      display: inline-block;
      background: #4f46e5;
      color: #fff;
      font-size: 18px;
      font-weight: 600;
      padding: 16px 48px;
      border-radius: 12px;
      text-decoration: none;
      transition: all 0.2s;
      box-shadow: 0 4px 14px rgba(79, 70, 229, 0.4);
    }

    .download-btn:hover {
      background: #4338ca;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(79, 70, 229, 0.5);
    }

    .version {
      margin-top: 12px;
      font-size: 14px;
      color: #64748b;
    }

    .features {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      margin: 64px 0;
      text-align: left;
    }

    .feature {
      background: rgba(255, 255, 255, 0.05);
      padding: 24px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .feature h3 {
      font-size: 16px;
      margin-bottom: 8px;
      color: #e2e8f0;
    }

    .feature p {
      font-size: 14px;
      color: #94a3b8;
      line-height: 1.6;
    }

    .screenshot {
      width: 100%;
      max-width: 700px;
      margin: 48px 0;
      border-radius: 16px;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .footer {
      margin-top: 64px;
      padding-top: 32px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      color: #64748b;
      font-size: 14px;
    }

    .footer a {
      color: #818cf8;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 640px) {
      h1 {
        font-size: 36px;
      }

      .tagline {
        font-size: 16px;
      }

      .features {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="蜗迹.png" alt="蜗迹" class="logo">

    <h1>蜗迹</h1>
    <p class="tagline">慢即是快，用思考和专注实现更高的效率</p>

    <a href="https://github.com/Valentino-cai/WoTrace/releases/download/v0.3/WoTrace-Release.dmg" class="download-btn">免费下载</a>
    <p class="version">macOS 13.0+ · Apple Silicon & Intel</p>

    <img src="download.png" alt="蜗迹界面" class="screenshot">

    <div class="features">
      <div class="feature">
        <h3>🎯 目标追踪</h3>
        <p>录入目标和你认为的关键步骤，支持动态添加，一路记录你的思考过程。</p>
      </div>
      <div class="feature">
        <h3>⏱️ 专注计时</h3>
        <p>实时追踪任务执行时间，暂停继续灵活切换，掌握每一分钟的流向。</p>
      </div>
      <div class="feature">
        <h3>🔔 智能提醒</h3>
        <p>15分钟无更新自动提醒，检查注意力是否被分散，及时拉回正轨。</p>
      </div>
    </div>

    <div class="footer">
      <p>开源项目 · MIT License</p>
      <p style="margin-top: 8px;">
        <a href="https://github.com/Valentino-cai/WoTrace">GitHub</a> ·
        <a href="https://github.com/Valentino-cai/WoTrace/issues">反馈问题</a>
      </p>
    </div>
  </div>
</body>
</html>
